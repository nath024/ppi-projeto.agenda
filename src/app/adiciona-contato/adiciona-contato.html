<div class="container mt-5">

    <h2 class="text-center mb-4">
        Agenda de Contatos
    </h2>

    <form
        [formGroup]="formulario"
        (ngSubmit)="cadastrar()">

        <div class="mb-3">

            <label>Nome</label>

            <input
                class="form-control"
                formControlName="nome">

        </div>

        <div class="mb-3">

            <label>Telefone</label>

            <input
                class="form-control"
                formControlName="telefone">

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input
                class="form-control"
                formControlName="email">

        </div>

        <div class="mb-3">

            <label>Aniversário</label>

            <input
                type="date"
                class="form-control"
                formControlName="aniversario">

        </div>

        <div class="mb-3">

            <label>Tipo</label>

            <select
                class="form-select"
                formControlName="tipo">

                @for(tipo of tipos; track tipo){

                    <option [value]="tipo">

                        {{tipo}}

                    </option>

                }

            </select>

        </div>

        <button
            class="btn btn-primary w-100">

            Cadastrar

        </button>

    </form>

    <hr>

    <table
        class="table table-striped table-bordered mt-4">

        <thead class="table-dark">

            <tr>

                <th>Nome</th>

                <th>Telefone</th>

                <th>Email</th>

                <th>Aniversário</th>

                <th>Tipo</th>

            </tr>

        </thead>

        <tbody>

            @for(contato of contatos; track contato){

                <tr>

                    <td>{{contato.getNome()}}</td>

                    <td>{{contato.getTelefone()}}</td>

                    <td>{{contato.getEmail()}}</td>

                    <td>{{contato.getAniversario()}}</td>

                    <td>{{contato.getTipo()}}</td>

                </tr>

            }

        </tbody>

    </table>

</div>
